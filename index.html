<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />

    <!-- SEO -->
    <title>AI Prompt Sanitizer | Remove API Keys & Sensitive Data | PromptShield</title>

    <meta
      name="description"
      content="Protect your AI prompts by removing API keys, emails, tokens, and sensitive data. PromptShield helps teams safely share prompts with browser-based sanitization."
    />

    <meta
      name="keywords"
      content="AI prompt sanitizer, remove API keys, prompt security, sanitize prompts, token redaction, prompt privacy tool"
    />

    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://promptshield.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PromptShield | AI Prompt Sanitizer" />
    <meta
      property="og:description"
      content="Sanitize AI prompts by masking API keys, emails, phone numbers, tokens, URLs, and credit cards before sharing."
    />
    <meta property="og:site_name" content="PromptShield" />
    <meta property="og:url" content="https://promptshield.in/" />
    <meta property="og:image" content="https://promptshield.in/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PromptShield | AI Prompt Sanitizer" />
    <meta
      name="twitter:description"
      content="PromptShield helps sanitize prompts by removing sensitive data like API keys, emails, and tokens."
    />
    <meta name="twitter:image" content="https://promptshield.in/og-image.png" />

    <!-- Structured Data (SEO Boost) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PromptShield",
        "url": "https://promptshield.in",
        "description": "AI prompt sanitizer for removing sensitive data before sharing prompts."
      }
    </script>

    <!-- Google AdSense -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6171101234352171"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="bg-slate-950">
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
